services:
  python-app:                                                                                                                 
    build: .                                                                                                            
    container_name: python-app                                                                                                         
    ports:                                                                                                                       
      - 5000:5000                                                                                                    
    volumes:                                                                                                                     
      - ./app:/app
    env_file:                                                                                                 
      - .env
    depends_on:
      - db
  db:                                                                                                                 
    image: postgres:15-alpine                                                                                                               
    container_name: ostgres_data                                                                                                         
    ports:                                                                                                                       
      - 5432:5432                                                                                                    
    env_file:                                                                                                 
      - .env
    volumes:   
      - postgres_data:/var/lib/postgresql/data
volumes:   
  postgres_data:                                                                                                                  