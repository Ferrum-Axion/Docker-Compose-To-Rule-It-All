services:
  proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy

  
  api:
    image: my_node_api1:latest
    container_name: my_api_server
    environment:
      - DB_HOST=db
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - REDIS_HOST=cache
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    secrets:
      - db_password
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 4
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy


  
  db:
    image: postgres:15-alpine
    container_name: my_postgres_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pg_volume:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  cache:
    image: redis:7-alpine
    container_name: my_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
  
  worker:
    image: my_node_api1:latest
    command: node src/worker.js
    environment:
      - REDIS_HOST=cache
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    secrets:
      - db_password
    networks:
      - backend
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
       db:
        condition: service_healthy
       cache:
        condition: service_healthy

  flower:
    image: mher/flower:2.0
    container_name: my_flower
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@cache:6379/0
    ports:
      - "5555:5555"
    networks:
      - backend
    profiles:
      - monitoring
    depends_on:
      - cache

volumes:
  pg_volume:

secrets:
  db_password:
    file: ./secrets/db_password.txt

networks:
  backend:
    internal: true
  frontend: